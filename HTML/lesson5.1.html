<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="..\JS\lesson5.1.js" defer></script>
    <link rel="stylesheet" href="..\CSS\style5.1.css">
</head>
<body>

<div id="SignUp">
    <div id="HasError"></div>

    <label for="email">Email: </label>
    <input type="text" id="email">
    <div id="emailError"></div>

    <label for="Password">Password: </label>
    <input type="password" id="password">
    <div id="passwordError"></div>

    <label for="repeatPassword">Repeat password: </label>
    <input type="text" id="repeatPassword">
    <div id="passwordReapeatError"></div>

    <button  id="register">Sign up</button>
</div>
<div id="AfterSignUp">
    <div id="HelloEmail">Hello, [email]! <a href="">exit</a></div>

    <div id="UserInfo">
        <div>User info</div>
        <div class="UserInfoInput">
            <label for="FirstName">First Name:</label>
            <input type="text" id="FirstName">
            <div id="FirstNameError"></div>

            <label for="SecondName">Second Name:</label>
            <input type="text" id="SecondName">
            <div id="SecondNameError"></div>
        </div>
        <div class="UserInfoInput">
            <label for="YearOfBirth">Year of birth:</label>
            <input type="text" id="YearOfBirth">
            <div id="YearOfBirthError"></div>

            <label for="Gender">Gender:</label>
            <select id="Gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="DNT">Dont prefer to say</option>
            </select>
        </div>
        <div class="UserInfoInput">
            <label for="PhoneNumber">Phone number:</label>
            <input type="text" id="PhoneNumber">
            <div id="PhoneNumberError"></div>

            <label for="Skype">Skype:</label>
            <input type="text" id="Skype">
            <div id="SkypeError"></div>
        </div>
        <button id="Save">Save</button>
        <div id="SaveError"></div>
    </div>
</div>

</body>
</html>
